name: gmail_client_flutter
description: "Flutter bindings for gmail_client — Riverpod providers, Google Sign-In, and platform-specific OAuth utils for Gmail integration."
version: 1.0.0
repository: https://github.com/domoplate/gmail_client
issue_tracker: https://github.com/domoplate/gmail_client/issues
topics:
  - gmail
  - email
  - supabase
  - riverpod
  - google-sign-in

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  gmail_client: ">=1.0.0 <2.0.0"
  supabase_flutter: ">=2.0.0 <3.0.0"
  google_sign_in: ">=7.0.0 <8.0.0"
  extension_google_sign_in_as_googleapis_auth: ">=3.0.0 <4.0.0"
  flutter_riverpod: ">=2.0.0 <3.0.0"
  file_picker: ">=8.0.0 <9.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
